<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Twaresh Denis Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/portal-assets/css/tic-theme.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="brand-mark">TD</div>
      <h1>Dashboard Sign In</h1>
      <p>Manage site content, sections, submissions, and settings.</p>
      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" required value="admin">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required value="admin123">
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%">Sign in</button>
        <div class="status" id="status"></div>
      </form>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (API.token()) window.location.href = 'app.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const status = document.getElementById('status');
      status.className = 'status';
      status.textContent = 'Signing in…';
      try {
        const data = await API.login(
          document.getElementById('username').value.trim(),
          document.getElementById('password').value
        );
        saveTokens(data);
        window.location.href = 'app.html';
      } catch (err) {
        status.className = 'status error';
        status.textContent = err.message || 'Invalid credentials';
      }
    });
  </script>
</body>
</html>

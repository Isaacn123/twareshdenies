<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investor Sign In — Twaresh Financial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-logo">T</div>
      <h1>Investor Sign In</h1>
      <p>Access your private wealth dashboard.</p>
      <div class="auth-tabs">
        <a href="login" class="active">Sign In</a>
        <a href="register">Register</a>
      </div>
      <form id="loginForm">
        <div class="field"><label>Username</label><input id="username" required autocomplete="username"></div>
        <div class="field"><label>Password</label><input id="password" type="password" required autocomplete="current-password"></div>
        <button class="btn-primary" type="submit">Sign in</button>
        <div class="status" id="status"></div>
      </form>
      <p style="margin-top:14px;font-size:13px;color:var(--text2);text-align:center">
        New investor? <a href="register" style="color:var(--gold2);font-weight:600">Create an account</a>
      </p>
      <p style="margin-top:12px;font-size:12px;color:var(--text3);text-align:center"><a href="/" style="color:var(--gold2)">← Back to public site</a></p>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (API.token()) window.location.href = 'app';
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const status = document.getElementById('status');
      status.className = 'status';
      try {
        saveTokens(await API.login(document.getElementById('username').value.trim(), document.getElementById('password').value));
        await API.me();
        window.location.href = 'app';
      } catch (err) {
        clearTokens();
        status.className = 'status error';
        status.textContent = err.message?.includes('portal') || err.message?.includes('403')
          ? 'Your account is pending advisor approval. You will be able to sign in once your portal is activated.'
          : (err.message || 'Invalid credentials or portal not yet activated.');
      }
    });
  </script>
</body>
</html>

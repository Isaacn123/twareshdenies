<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Become an Investor — Twaresh Financial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-shell">
    <div class="auth-card auth-card-wide">
      <div class="auth-logo">T</div>
      <h1>Become an Investor</h1>
      <p>Create your client portal account. Access is activated after advisor review.</p>
      <div class="auth-tabs">
        <a href="login">Sign In</a>
        <a href="register" class="active">Register</a>
      </div>
      <form id="registerForm">
        <div class="field"><label>Full name</label><input id="fullName" required autocomplete="name"></div>
        <div class="field"><label>Email</label><input id="email" type="email" required autocomplete="email"></div>
        <div class="field"><label>Phone</label><input id="phone" type="tel" autocomplete="tel"></div>
        <div class="field"><label>Username</label><input id="username" required autocomplete="username"></div>
        <div class="field"><label>Password (min. 8 characters)</label><input id="password" type="password" required minlength="8" autocomplete="new-password"></div>
        <div class="field"><label>Investor type</label>
          <select id="investorType">
            <option value="hnwi">High-Net-Worth Individual</option>
            <option value="entrepreneur">Entrepreneur</option>
            <option value="executive">Corporate Executive</option>
            <option value="family_office">Family Office</option>
            <option value="institutional">Institutional Investor</option>
            <option value="other">Other</option>
          </select>
        </div>
        <button class="btn-primary" type="submit">Create account</button>
        <div class="status" id="status"></div>
      </form>
      <p class="auth-footer"><a href="/">← Back to public site</a></p>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      const status = document.getElementById('status');
      status.className = 'status';
      status.textContent = 'Submitting…';
      try {
        const res = await API.register({
          full_name: document.getElementById('fullName').value.trim(),
          email: document.getElementById('email').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
          investor_type: document.getElementById('investorType').value,
        });
        status.textContent = res.message || 'Registration successful.';
        document.getElementById('registerForm').reset();
      } catch (err) {
        status.className = 'status error';
        status.textContent = err.message || 'Registration failed.';
      }
    });
  </script>
</body>
</html>

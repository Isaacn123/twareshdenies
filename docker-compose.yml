# Requires .env in this directory (copy from .env.example).

services:
  db:
    image: mysql:8.4
    container_name: twaresh_mysql
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PUBLISH_PORT}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5
    container_name: twaresh_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${PHPMYADMIN_PORT}:80"

  backend:
    build: ./backend
    container_name: twaresh_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - media_data:/app/media
    ports:
      - "${BACKEND_PORT}:8000"

  public-site:
    build: ./frontend
    container_name: twaresh_public_site
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  mysql_data:
  media_data:
